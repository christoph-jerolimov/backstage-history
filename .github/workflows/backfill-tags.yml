name: Backfill Backstage release tags

# One-off helper: creates the missing release tags 1.43.0 - 1.52.0 on their
# "Backstage X.Y.Z Scaffold" commits. Safe to re-run (skips existing tags)
# and can be deleted once the tags are pushed.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/github-action-backstage-weekly-ixhmcq
    paths:
      - .github/workflows/backfill-tags.yml

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create and push missing tags
        run: |
          set -e
          while read -r version sha; do
            if git ls-remote --exit-code --tags origin "refs/tags/$version" >/dev/null; then
              echo "Tag $version already exists, skipping."
              continue
            fi
            git tag "$version" "$sha"
            git push origin "refs/tags/$version"
            echo "Pushed tag $version -> $sha"
          done <<'EOF'
          1.43.0 0fa502784b0736e41b0513a40f38bdf2343bfed9
          1.44.0 f892cb9c69984ae910609abb46678172a3271310
          1.45.0 85e94d7890a8cd52480fac8e98f002eed7d77f93
          1.46.0 bb891b725fce85018933f0a865616a682ed9cc88
          1.47.0 bb0c6876d9004b68a163ca9a8502744658e911f8
          1.47.2 fcd9987ab57868e8a6812ab86afb1fde4f1ad33c
          1.48.0 24f8191345e08528b310ca05dd4da6a79aa7b3e2
          1.49.0 8c7d30d05c67785b4b29b99ef923f68d5c58dca1
          1.49.1 3ff9a1187883cd8cf46f846906f86677964c2d42
          1.50.0 f9e3b0f7b5ba52f5aba09fb1c6d67a73e1829525
          1.51.0 51dae9576b45f6d3ac9d0624ec35e2f2edfec883
          1.52.0 e2469ef278069265299587ff080bfb63084d79a8
          EOF

name: Regenerate Backstage app

on:
  workflow_dispatch:
  schedule:
    # Every Wednesday at 03:00 UTC
    - cron: '0 3 * * 3'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Remove all files and folders except .git and .github
        run: |
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name '.github' -exec rm -rf {} +

      - name: Generate a new Backstage app
        run: |
          BACKSTAGE_APP_NAME=backstage npx -y @backstage/create-app@latest --path .

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Regenerate Backstage app ($(date -u +%Y-%m-%d))"
            git push origin main
          fi
